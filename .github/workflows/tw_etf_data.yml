name: ETF Update

on:
  schedule:
    - cron: "0 * * * *"   # 每小時
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install deps
      run: pip install pandas requests lxml beautifulsoup4 html5lib

    - name: Run ETF pipeline
      run: python src/tw_etf_data.py

    - name: Commit changes
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add data/
        git diff --cached --quiet || git commit -m "update ETF data"
        git push
