name: ETF Auto Fetch

on:
  schedule:
    # 台灣 08:30 = UTC 00:30
    - cron: '30 0 * * 1-5'
    # 台灣 15:30 = UTC 07:30
    - cron: '30 7 * * 1-5'

  workflow_dispatch:  # 可手動執行

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install packages
        run: |
          pip install pandas requests lxml

      - name: Run script
        run: python etf.py

      - name: Commit data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/0050_nav.csv
          git commit -m "update 0050 nav" || echo "no change"
          git push
