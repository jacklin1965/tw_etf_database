name: Update ETF Data

on:
  schedule:
    - cron: "0 10 * * *"   # 台灣18:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install deps
      run: pip install pandas requests lxml beautifulsoup4 html5lib

    - name: Run ETF fetch
      run: python src/main.py

    # ✅ 這步只是「判斷」
    - name: Check if data changed
      id: check
      run: |
        if grep -q "true" changed.flag; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    # ✅ 這步才是真的 commit
    - name: Commit & Push
      if: steps.check.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git commit -m "update etf data"
        git push
